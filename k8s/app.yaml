# Deployment + Service for the commission-app container.
#
# Image tag is set at deploy time via deploy.sh — never hardcoded here.
# All environment variables are sourced from the `superfield-api-secrets` Secret.
#
# Health probes (paths must match routes the server actually serves):
#   livenessProbe  → GET /healthz (process alive)
#   readinessProbe → GET /readyz  (DB reachable)
#
# Architecture constraints:
#   - Distroless production image (WORKER-C-001 — no shell in runtime)
#   - Three DB URLs from single superfield-api-secrets Secret (DATA-A-001)
#
# Apply order:
#   kubectl apply -f k8s/namespaces.yaml
#   kubectl apply -f k8s/secrets.yaml
#   kubectl apply -f k8s/postgres.yaml
#   kubectl apply -f k8s/app.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: commission-app
  labels:
    app: commission-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: commission-app
  template:
    metadata:
      labels:
        app: commission-app
    spec:
      containers:
        - name: app
          # Image tag is set via deploy.sh:
          #   kubectl set image deployment/commission-app app=ghcr.io/<owner>/commission-mgmt:<tag>
          image: ghcr.io/<owner>/commission-mgmt:latest
          ports:
            - containerPort: 31415
          env:
            - name: PORT
              value: '31415'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: superfield-api-secrets
                  key: DATABASE_URL
            - name: ANALYTICS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: superfield-api-secrets
                  key: ANALYTICS_DATABASE_URL
            - name: AUDIT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: superfield-api-secrets
                  key: AUDIT_DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: superfield-api-secrets
                  key: JWT_SECRET
            - name: ENCRYPTION_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: superfield-api-secrets
                  key: ENCRYPTION_MASTER_KEY
          livenessProbe:
            httpGet:
              path: /healthz
              port: 31415
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 31415
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
---
apiVersion: v1
kind: Service
metadata:
  name: commission-app
  labels:
    app: commission-app
spec:
  selector:
    app: commission-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 31415
  type: ClusterIP
