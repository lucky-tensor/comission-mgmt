# Deployment for commission-worker — background job runner.
#
# Processes guarantee-expiry, clawback-trigger, and related commission tasks.
# Architecture constraints:
#   - Distroless worker image (WORKER-C-001 — no shell in runtime)
#   - Network-isolated: no DB credential at all; all reads and writes go through
#     the application API (WORKER-X-009, WORKER-C-006). The worker holds NO
#     DATABASE_URL and NO ENCRYPTION_MASTER_KEY — the startup guard aborts boot
#     if either is present (apps/worker/src/startup-guard.ts).
#   - Claims and submits tasks via API_BASE_URL (HTTP to commission-app) using
#     single-use, task-scoped delegated tokens.
#
# Apply order:
#   kubectl apply -f k8s/namespaces.yaml
#   kubectl apply -f k8s/secrets.yaml
#   kubectl apply -f k8s/app.yaml   (worker waits for app health)
#   kubectl apply -f k8s/worker.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: commission-worker
  labels:
    app: commission-worker
    role: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: commission-worker
  template:
    metadata:
      labels:
        app: commission-worker
        role: worker
    spec:
      containers:
        - name: worker
          # Image tag is set via deploy.sh:
          #   kubectl set image deployment/commission-worker worker=ghcr.io/<owner>/commission-mgmt-worker:<tag>
          image: ghcr.io/<owner>/commission-mgmt-worker:latest
          # No DB credential is injected. The worker reads and writes ONLY through
          # the application API; it has no DATABASE_URL and no ENCRYPTION_MASTER_KEY.
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            # Write/read channel — delegated tokens submitted to the local app server.
            - name: API_BASE_URL
              value: 'http://commission-app'
          resources:
            requests:
              cpu: '50m'
              memory: '64Mi'
            limits:
              cpu: '500m'
              memory: '256Mi'
