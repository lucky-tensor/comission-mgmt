# Secrets template — copy to secrets.yaml, fill in real values, then apply.
#
# IMPORTANT: secrets.yaml must NEVER be committed to version control.
# Add secrets.yaml to .gitignore before creating it.
#
# Apply order:
#   kubectl apply -f k8s/secrets.yaml          # apply filled-in secrets
#   kubectl apply -f k8s/postgres.yaml
#   kubectl apply -f k8s/app.yaml
#
# Secret values — use stringData (plain text, encoded automatically by kubectl):
#   stringData:
#     KEY: plain-text-value
#
# Or use base64-encoded data:
#   echo -n 'my-value' | base64

---
# superfield-api-secrets
# Used by: commission-app Deployment, commission-worker Deployment, migration Job
apiVersion: v1
kind: Secret
metadata:
  name: superfield-api-secrets
type: Opaque
stringData:
  # PostgreSQL superuser credentials (used by the postgres StatefulSet)
  POSTGRES_USER: 'app_rw'
  POSTGRES_PASSWORD: '<app-rw-password>'
  POSTGRES_DB: 'commission_app'

  # Application database connection URLs
  # Three physically separated databases (DATA-A-001):
  DATABASE_URL: 'postgres://app_rw:<app-rw-password>@commission-postgres:5432/commission_app'
  ANALYTICS_DATABASE_URL: 'postgres://analytics_w:<analytics-w-password>@commission-postgres:5432/commission_analytics'
  AUDIT_DATABASE_URL: 'postgres://audit_w:<audit-w-password>@commission-postgres:5432/commission_audit'

  # JWT secret for API authentication
  JWT_SECRET: '<generate-with-openssl-rand-hex-32>'

  # Encryption master key — 64 hex characters (32 bytes).
  # Generate with: openssl rand -hex 32
  # Must match the key used when encrypting stored credentials.
  ENCRYPTION_MASTER_KEY: '<64-hex-char-encryption-master-key>'

---
# cloudflared-credentials
# Used by: cloudflared Deployment (commission-demo namespace)
# Create with:
#   cloudflared tunnel login
#   cloudflared tunnel create commission-demo
#   kubectl create secret generic cloudflared-credentials \
#     -n commission-demo \
#     --from-file=credentials.json=~/.cloudflared/<tunnel-id>.json
#
# The credentials.json is generated by `cloudflared tunnel create` and contains
# the tunnel's account tag, tunnel ID, and tunnel secret. Do not commit it.
#
# There is no stringData equivalent — use the kubectl command above directly.
# (Shown here for documentation only; kubectl create secret is the canonical path.)
