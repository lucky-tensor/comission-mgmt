<!-- @dsCard group="Type" viewport="700x320" name="Type scale — Geist" subtitle="Display → meta, the full UI ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .meta { width: 130px; flex: 0 0 auto; font: var(--text-xs) var(--font-mono); color: var(--text-tertiary); }
  .spec { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="row"><span class="meta">display · 30/600</span><span class="spec" style="font:var(--weight-semibold) var(--text-display)/1 var(--font-sans);letter-spacing:var(--tracking-tight)">Manage everything</span></div>
  <div class="row"><span class="meta">h1 · 24/600</span><span class="spec" style="font:var(--weight-semibold) var(--text-h1)/1 var(--font-sans);letter-spacing:var(--tracking-tight)">Users &amp; permissions</span></div>
  <div class="row"><span class="meta">h2 · 19/600</span><span class="spec" style="font:var(--weight-semibold) var(--text-h2)/1 var(--font-sans);letter-spacing:var(--tracking-snug)">Active members</span></div>
  <div class="row"><span class="meta">h3 · 16/600</span><span class="spec" style="font:var(--weight-semibold) var(--text-h3)/1 var(--font-sans)">Panel heading</span></div>
  <div class="row"><span class="meta">body · 14/400</span><span class="spec" style="font:var(--weight-regular) var(--text-body)/1 var(--font-sans)">Default body and control text for every screen.</span></div>
  <div class="row"><span class="meta">sm · 13/400</span><span class="spec" style="font:var(--weight-regular) var(--text-sm)/1 var(--font-sans)">Secondary text and dense table cells.</span></div>
  <div class="row"><span class="meta">xs · 12/400</span><span class="spec" style="font:var(--weight-regular) var(--text-xs)/1 var(--font-sans)">Meta, hints, timestamps.</span></div>
</body>
</html>
