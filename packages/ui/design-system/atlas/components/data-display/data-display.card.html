<!-- @dsCard group="Components" viewport="700x280" name="Data display — table, badges, stats" subtitle="Table, Badge, Avatar, StatCard" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 20px; background: var(--surface-page); }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 16px; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Table, Badge, Avatar, StatCard, Card } = window.AtlasDesignSystem_9b7d80;
const Users = () => <svg viewBox="0 0 16 16" width="16" height="16" fill="none"><circle cx="8" cy="6" r="2.4" stroke="currentColor" strokeWidth="1.4"/><path d="M3.5 13a4.5 4.5 0 019 0" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg>;

const data = [
  { id:1, name:'Dana Reyes', email:'dana@acme.com', role:'Admin', status:'Active' },
  { id:2, name:'Liam Okafor', email:'liam@acme.com', role:'Member', status:'Pending' },
  { id:3, name:'Priya Shah', email:'priya@acme.com', role:'Viewer', status:'Suspended' },
];
const toneFor = { Active:'success', Pending:'warning', Suspended:'danger' };
const cols = [
  { key:'name', header:'User', render:(v,r)=>(
    <span style={{display:'inline-flex',alignItems:'center',gap:10}}>
      <Avatar name={v} size="sm" />
      <span style={{display:'flex',flexDirection:'column'}}>
        <span style={{fontWeight:500,color:'var(--text-primary)'}}>{v}</span>
        <span style={{fontSize:'var(--text-xs)',color:'var(--text-tertiary)'}}>{r.email}</span>
      </span>
    </span>) },
  { key:'role', header:'Role' },
  { key:'status', header:'Status', render:(v)=><Badge tone={toneFor[v]} dot>{v}</Badge> },
];

function Demo(){
  const [sel,setSel]=React.useState([1]);
  return (
    <div>
      <div className="stats">
        <StatCard label="Active users" value="8,420" delta="+12%" trend="up" icon={<Users/>} />
        <StatCard label="Churn rate" value="1.8%" delta="-0.3%" trend="down" />
        <StatCard label="Open tickets" value="36" delta="0" trend="flat" />
      </div>
      <div className="badges">
        <Badge tone="success" dot>Active</Badge>
        <Badge tone="warning" dot>Pending</Badge>
        <Badge tone="danger" dot>Suspended</Badge>
        <Badge tone="info">Beta</Badge>
        <Badge>v2.4.1</Badge>
      </div>
      <Card padding="none">
        <Table columns={cols} data={data} selectable selected={sel} onSelectedChange={setSel} />
      </Card>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
