name: API Integration Tests

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'chore/**']
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - '.github/workflows/test-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - '.github/workflows/test-api.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Run API integration tests
        run: |
          if [ -f apps/server/vitest.integration.config.ts ]; then
            bun --bun vitest run --config apps/server/vitest.integration.config.ts
          else
            echo "::notice::vitest.integration.config.ts not found — skipping (feature not yet landed)"
          fi
