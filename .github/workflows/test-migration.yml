name: Migration Smoke Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'packages/db/**'
      - '.github/workflows/test-migration.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Run migration smoke tests
        run: |
          if [ -f apps/server/vitest.migration.config.ts ]; then
            bun --bun vitest run --config apps/server/vitest.migration.config.ts
          else
            echo "::notice::vitest.migration.config.ts not found — skipping (feature not yet landed)"
          fi
