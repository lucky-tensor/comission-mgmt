# test-e2e.yml — Browser component + E2E story suite (headless Chromium).
#
# Each test file runs as an independent matrix job with its own ephemeral
# Postgres container and API server, so all jobs parallelize on GitHub Actions.
#
# Blueprint: TEST-D-004 / IMPL-TEST-002 (headless-browser provider, never JSDOM).
# Issue: feat: Producer Portal UI + headless-Chromium browser/E2E harness (#78)

name: E2E browser tests

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'test/**', 'e2e/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-e2e-${{ github.ref }}-${{ matrix.file }}
  cancel-in-progress: true

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Component tests (no real server calls, but globalSetup still runs)
          - name: component
            file: tests/component

          # Standalone E2E suites
          - name: e2e-app-shell
            file: tests/e2e/app-shell.e2e.ts
          - name: e2e-partner-flow
            file: tests/e2e/partner-flow.e2e.ts

          # User story suites — one per role
          - name: stories-finance-admin
            file: tests/e2e/stories/finance-admin.stories.e2e.ts
          - name: stories-producer
            file: tests/e2e/stories/producer.stories.e2e.ts
          - name: stories-manager
            file: tests/e2e/stories/manager.stories.e2e.ts
          - name: stories-executive
            file: tests/e2e/stories/executive.stories.e2e.ts
          - name: stories-hr
            file: tests/e2e/stories/hr.stories.e2e.ts
          - name: stories-partner
            file: tests/e2e/stories/partner.stories.e2e.ts

    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run ${{ matrix.name }}
        run: bun run test:browser -- ${{ matrix.file }}
